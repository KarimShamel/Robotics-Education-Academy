<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Wajha Robotics Education</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --danger: #ef4444;
            --success: #10B981;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 2fr;
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-top: 0;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #cbd5e1;
        }

        input[type="text"], input[type="url"], textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            display: inline;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, #3730A3 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #b91c1c 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        
        .btn-danger:hover {
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            margin-top: 1rem;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: block;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }

        /* Post List */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .post-item {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .post-info h3 {
            margin: 0 0 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .featured-badge {
            font-size: 0.7rem;
            background: #F59E0B;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 99px;
            font-weight: bold;
        }

        .post-info p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-actions {
            display: flex;
            gap: 0.5rem;
            min-width: 160px;
        }

        .post-actions button {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        /* Scroll to Top Button Styling */
        #scrollToTopBtn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: #0C469B; /* bg-primary-blue */
            color: white;
            width: 3rem;
            height: 3rem;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 50;
            border: none;
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        #scrollToTopBtn.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        #scrollToTopBtn:hover {
            background-color: #1D4ED8; /* hover:bg-blue-700 */
            transform: scale(1.1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <nav style="max-width: 1200px; margin: 0 auto 2rem auto; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 1rem 2rem; border-radius: 16px; backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1);">
        <div style="font-weight: 700; font-size: 1.2rem;">Admin Dashboard</div>
        <div style="display: flex; gap: 1rem;">
            <a href="../home/index.html" style="color: var(--text-main); text-decoration: none; font-weight: 500; background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 8px;">Back to Home</a>
            <button id="navLogoutBtn" class="btn-danger" style="width: auto; padding: 0.5rem 1rem;">Logout</button>
        </div>
    </nav>
    <div class="container">
        <!-- Form Section -->
        <div class="card">
            <h2 id="formTitle">Create New Blog</h2>
            <div id="formMessage" class="message"></div>
            
            <form id="blogForm">
                <input type="hidden" id="blogId">
                
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required placeholder="Enter blog title">
                </div>
                
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" required placeholder="Write your blog content here..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Blog Images (Upload Multiple)</label>
                    <input type="file" id="image_upload" accept="image/jpeg, image/png, image/webp" multiple style="width: 100%; padding: 0.8rem 1rem; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; box-sizing: border-box;">
                    <input type="hidden" id="image_url">
                    <div id="image_preview_container" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;"></div>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="is_featured">
                    <label for="is_featured">Feature on Homepage (only one can be featured)</label>
                </div>

                <button type="submit" id="submitBtn">Save Blog</button>
                <button type="button" id="cancelBtn" class="btn-secondary" style="display: none;">Cancel Edit</button>
            </form>
        </div>

        <!-- List Section -->
        <div class="card">
            <h2>Existing Blogs</h2>
            <div class="post-list" id="postList">
                <div style="text-align: center; color: var(--text-muted); padding: 2rem;">Loading...</div>
            </div>
            <div id="paginationControls" style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem;"></div>
        </div>
    </div>

    <script type="module">
        import { isAuthenticated, getUserRole } from '../auth/auth-client.js';
        
        // Verify authentication with server before showing anything
        const checkAuth = async () => {
            const isLocalAuth = localStorage.getItem('isLoggedIn') === 'true';
            const localRole = localStorage.getItem('userRole');
            
            // Show optimistic UI immediately if they look like an admin
            if (isLocalAuth && localRole === 'admin') {
                document.body.style.display = 'block';
            }

            const isAuth = await isAuthenticated();
            const role = await getUserRole();
            if (!isAuth || role !== 'admin') {
                window.location.href = '../auth/login.html';
                return false;
            }
            document.body.style.display = 'block'; // Show page only after auth confirmed
            return true;
        };

        // Hide body until auth checked
        document.body.style.display = 'none';

        const escapeHtml = (unsafe) => {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };

        // Basic app logic to handle CRUD
        let isEditing = false;
        const apiBase = '/api/blogs';

        const form = document.getElementById('blogForm');
        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const formMessage = document.getElementById('formMessage');
        const postList = document.getElementById('postList');

        let uploadedImages = [];

        const fields = {
            id: document.getElementById('blogId'),
            title: document.getElementById('title'),
            content: document.getElementById('content'),
            image_url: document.getElementById('image_url'),
            is_featured: document.getElementById('is_featured')
        };

        const imageUpload = document.getElementById('image_upload');
        const imagePreviewContainer = document.getElementById('image_preview_container');

        const renderImagePreviews = () => {
            imagePreviewContainer.innerHTML = '';
            uploadedImages.forEach((imgUrl, index) => {
                const div = document.createElement('div');
                div.style.position = 'relative';
                div.style.width = '100px';
                div.style.height = '100px';
                
                const img = document.createElement('img');
                img.src = imgUrl;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '8px';
                img.style.border = fields.image_url.value === imgUrl ? '3px solid var(--primary)' : '1px solid rgba(255,255,255,0.2)';
                
                const deleteBtn = document.createElement('button');
                deleteBtn.innerHTML = '&times;';
                deleteBtn.type = 'button';
                deleteBtn.style.position = 'absolute';
                deleteBtn.style.top = '-5px';
                deleteBtn.style.right = '-5px';
                deleteBtn.style.width = '20px';
                deleteBtn.style.height = '20px';
                deleteBtn.style.padding = '0';
                deleteBtn.style.borderRadius = '50%';
                deleteBtn.style.background = 'red';
                deleteBtn.style.color = 'white';
                deleteBtn.style.border = 'none';
                deleteBtn.style.cursor = 'pointer';
                
                const setMainBtn = document.createElement('button');
                setMainBtn.textContent = 'Main';
                setMainBtn.type = 'button';
                setMainBtn.style.position = 'absolute';
                setMainBtn.style.bottom = '0';
                setMainBtn.style.left = '0';
                setMainBtn.style.width = '100%';
                setMainBtn.style.padding = '2px';
                setMainBtn.style.fontSize = '10px';
                setMainBtn.style.background = 'rgba(0,0,0,0.7)';
                setMainBtn.style.border = 'none';
                
                deleteBtn.onclick = () => {
                    uploadedImages.splice(index, 1);
                    if (fields.image_url.value === imgUrl) {
                        fields.image_url.value = uploadedImages[0] || '';
                    }
                    renderImagePreviews();
                };
                
                setMainBtn.onclick = () => {
                    fields.image_url.value = imgUrl;
                    renderImagePreviews();
                };
                
                div.appendChild(img);
                div.appendChild(deleteBtn);
                div.appendChild(setMainBtn);
                imagePreviewContainer.appendChild(div);
            });
        };

        imageUpload.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            
            showMessage('Uploading images...', 'success');
            for(let i=0; i<files.length; i++) {
                const formData = new FormData();
                formData.append('file', files[i]);
                
                try {
                    const res = await fetch('/api/upload/blog', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error);
                    
                    uploadedImages.push(data.url);
                    if (!fields.image_url.value) fields.image_url.value = data.url;
                } catch(err) {
                    showMessage('Error uploading: ' + err.message, 'error');
                }
            }
            imageUpload.value = ''; // reset input
            renderImagePreviews();
            showMessage('Upload complete', 'success');
        });

        const showMessage = (msg, type) => {
            formMessage.textContent = msg;
            formMessage.className = `message ${type}`;
            setTimeout(() => { formMessage.className = 'message'; }, 4000);
        };

        let currentPage = 1;
        const LIMIT = 10;

        const loadBlogs = async (page = 1) => {
            try {
                currentPage = page;
                const res = await fetch(`${apiBase}?page=${page}&limit=${LIMIT}`);
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || 'Failed to load');

                const blogs = Array.isArray(data) ? data : (data.data || []);
                const meta = data.meta;

                postList.innerHTML = blogs.length ? '' : '<div style="text-align: center; color: var(--text-muted); padding: 2rem;">No blogs found.</div>';

                blogs.forEach(blog => {
                    const item = document.createElement('div');
                    item.className = 'post-item';
                    item.innerHTML = `
                        <div class="post-info">
                            <h3>
                                ${escapeHtml(blog.title)}
                                ${blog.is_featured ? '<span class="featured-badge">Featured</span>' : ''}
                            </h3>
                            <p>${escapeHtml(blog.content)}</p>
                        </div>
                        <div class="post-actions">
                            <button class="edit-btn" data-id="${blog.id}">Edit</button>
                            <button class="btn-danger delete-btn" data-id="${blog.id}">Delete</button>
                        </div>
                    `;
                    postList.appendChild(item);
                });

                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const blog = blogs.find(b => b.id == btn.dataset.id);
                        if (blog) editBlog(blog);
                    });
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => deleteBlog(btn.dataset.id));
                });

                // Render Pagination
                const paginationControls = document.getElementById('paginationControls');
                paginationControls.innerHTML = '';
                if (meta && (meta.has_prev_page || meta.has_next_page)) {
                    if (meta.has_prev_page) {
                        const prevBtn = document.createElement('button');
                        prevBtn.textContent = 'Previous';
                        prevBtn.className = 'btn-secondary';
                        prevBtn.style.width = 'auto';
                        prevBtn.onclick = () => loadBlogs(currentPage - 1);
                        paginationControls.appendChild(prevBtn);
                    }
                    
                    const pageIndicator = document.createElement('span');
                    pageIndicator.textContent = `Page ${currentPage}`;
                    pageIndicator.style.display = 'flex';
                    pageIndicator.style.alignItems = 'center';
                    pageIndicator.style.color = 'var(--text-muted)';
                    paginationControls.appendChild(pageIndicator);

                    if (meta.has_next_page) {
                        const nextBtn = document.createElement('button');
                        nextBtn.textContent = 'Next';
                        nextBtn.className = 'btn-secondary';
                        nextBtn.style.width = 'auto';
                        nextBtn.onclick = () => loadBlogs(currentPage + 1);
                        paginationControls.appendChild(nextBtn);
                    }
                }

            } catch (err) {
                postList.innerHTML = `<div style="color: var(--danger); text-align: center;">Error loading blogs: ${err.message}</div>`;
            }
        };

        const resetForm = () => {
            isEditing = false;
            form.reset();
            fields.id.value = '';
            fields.image_url.value = '';
            uploadedImages = [];
            renderImagePreviews();
            formTitle.textContent = 'Create New Blog';
            submitBtn.textContent = 'Save Blog';
            cancelBtn.style.display = 'none';
        };

        const editBlog = (blog) => {
            isEditing = true;
            fields.id.value = blog.id;
            fields.title.value = blog.title;
            fields.content.value = blog.content;
            fields.image_url.value = blog.image_url || '';
            uploadedImages = Array.isArray(blog.images) ? blog.images : (typeof blog.images === 'string' ? JSON.parse(blog.images) : []);
            if (blog.image_url && !uploadedImages.includes(blog.image_url)) {
                uploadedImages.unshift(blog.image_url);
            }
            fields.is_featured.checked = blog.is_featured;
            
            renderImagePreviews();
            formTitle.textContent = 'Edit Blog';
            submitBtn.textContent = 'Update Blog';
            cancelBtn.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const deleteBlog = async (id) => {
            if (!confirm('Are you sure you want to delete this blog?')) return;
            
            try {
                const res = await fetch(`${apiBase}/${id}`, { method: 'DELETE' });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || 'Failed to delete');
                
                showMessage('Blog deleted successfully!', 'success');
                if (fields.id.value == id) resetForm();
                loadBlogs(currentPage);
            } catch (err) {
                showMessage(err.message, 'error');
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.7';
            
            const payload = {
                title: fields.title.value,
                content: fields.content.value,
                image_url: fields.image_url.value,
                images: uploadedImages,
                is_featured: fields.is_featured.checked
            };

            const id = fields.id.value;
            const method = isEditing ? 'PUT' : 'POST';
            const url = isEditing ? `${apiBase}/${id}` : apiBase;

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Request failed');
                
                showMessage(isEditing ? 'Blog updated!' : 'Blog created!', 'success');
                resetForm();
                loadBlogs(isEditing ? currentPage : 1);
            } catch (err) {
                showMessage(err.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            }
        });

        cancelBtn.addEventListener('click', resetForm);

        // Initial load
        checkAuth().then(isAuth => {
            if (isAuth) {
                loadBlogs();
                document.getElementById('navLogoutBtn').addEventListener('click', async () => {
                    await fetch('/api/auth/sign-out', { method: 'POST' });
                    localStorage.removeItem('isLoggedIn');
                    localStorage.removeItem('userRole');
                    window.location.href = '../auth/login.html';
                });

                // Scroll to Top Button behavior
                const scrollTopBtn = document.getElementById('scrollToTopBtn');
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 300) {
                        scrollTopBtn.classList.add('visible');
                    } else {
                        scrollTopBtn.classList.remove('visible');
                    }
                });
                scrollTopBtn.addEventListener('click', () => {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
        });
    </script>
    
    <!-- Scroll to Top Button -->
    <button id="scrollToTopBtn" aria-label="Scroll to top">
        <span class="material-symbols-outlined">arrow_upward</span>
    </button>
</body>
</html>
